name: Reusable Azure ACR Workflow

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Versión de Java JDK a utilizar'
        required: false
        default: '17'
        type: string
    secrets:
      ACR_LOGIN_SERVER:
        description: 'Servidor de login de Azure Container Registry'
        required: true
      ACR_USERNAME:
        description: 'Usuario de Azure Container Registry'
        required: true
      ACR_PASSWORD:
        description: 'Contraseña de Azure Container Registry'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Set Image Name
        id: vars
        run: |
          REPO_NAME=$(basename ${{ github.repository }})
          echo "IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/$REPO_NAME" >> "$GITHUB_ENV"
      
      - name: Build The Docker Image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push The Docker Image
        run: docker push $IMAGE_NAME:latest
